<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt2Issue</title>
    <link rel="stylesheet" href="/style.css" />
    <!-- Apply the saved theme before paint to avoid a white flash on load -->
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
      })();
    </script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <h1>Prompt2Issue</h1>
        <span class="tagline">Turn your daily plan into cards</span>
      </div>
      <div class="date-controls">
        <label for="date-picker">Date</label>
        <input type="date" id="date-picker" />
        <select id="history-select" title="Saved days">
          <option value="">Past days…</option>
        </select>
        <button id="theme-toggle" class="theme-toggle" type="button" title="Toggle dark mode">🌙</button>
      </div>
    </header>

    <!-- AI plan input -->
    <section class="ai-box">
      <textarea
        id="plan-input"
        rows="3"
        placeholder="What do you want to get done today? e.g. Write the API docs, fix the login bug, prep for the team meeting…"
      ></textarea>
      <div class="ai-actions">
        <label class="preview-toggle">
          <input type="checkbox" id="preview-toggle" checked />
          Preview before adding
        </label>
        <button id="generate-btn" class="primary">Generate cards</button>
      </div>
      <p id="ai-status" class="status" hidden></p>
    </section>

    <!-- Category filter -->
    <div class="filter-bar">
      <label for="category-filter">Category</label>
      <select id="category-filter">
        <option value="">All</option>
      </select>
    </div>

    <!-- Kanban board -->
    <main class="board" id="board">
      <section class="column" data-status="todo">
        <header class="column-header">
          <h2>To Do</h2>
          <button class="add-card-btn" data-status="todo" title="Add card">+</button>
        </header>
        <div class="cards" data-status="todo"></div>
      </section>

      <section class="column" data-status="doing">
        <header class="column-header">
          <h2>In Progress</h2>
        </header>
        <div class="cards" data-status="doing"></div>
      </section>

      <section class="column" data-status="done">
        <header class="column-header">
          <h2>Done</h2>
        </header>
        <div class="cards" data-status="done"></div>
      </section>
    </main>

    <!-- Preview modal for AI-suggested cards -->
    <div class="modal-overlay" id="preview-modal" hidden>
      <div class="modal">
        <h2>AI suggestions</h2>
        <p class="modal-hint">Edit or remove cards, then add them.</p>
        <div id="preview-list" class="preview-list"></div>
        <div class="modal-actions">
          <button id="preview-cancel" class="ghost">Cancel</button>
          <button id="preview-confirm" class="primary">Confirm and add</button>
        </div>
      </div>
    </div>

    <!-- Editor modal for a single card (manual add / edit) -->
    <div class="modal-overlay" id="card-modal" hidden>
      <div class="modal">
        <h2 id="card-modal-title">New card</h2>
        <label>Title<input type="text" id="card-title" /></label>
        <label>Description<textarea id="card-description" rows="3"></textarea></label>
        <label>Category<input type="text" id="card-category" placeholder="e.g. work, bug, personal" /></label>
        <label>
          Priority
          <select id="card-priority">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
        <div class="modal-actions">
          <button id="card-cancel" class="ghost">Cancel</button>
          <button id="card-save" class="primary">Save</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
